<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats de recherche</title>
</head>
<body>
    <h1>Résultats</h1>

    {% if query %}
        <p>Recherche pour : <strong>{{ query }}</strong></p>
    {% else %}
        <p>Aucun mot-clé saisi.</p>
    {% endif %}

    <p><a href="{% url 'search:index' %}">Nouvelle recherche</a></p>
</body>
</html>
